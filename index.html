<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KomikKu - Baca Komik Bahasa Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--gbg:rgba(255,255,255,.75);--gbr:rgba(0,0,0,.06);--blur:40px;
--rs:12px;--rm:18px;--rl:28px;--rxl:36px;
--ac:#6C5CE7;--ac2:#A29BFE;--gr:linear-gradient(135deg,#6C5CE7,#A29BFE);
--red:#FF3B30;--grn:#00B894;--orn:#FDCB6E;
--t1:#1a1a2e;--t2:#636e72;--bg1:#f5f6fa;--bg2:#fff;
--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
--gbg:rgba(26,26,46,.88);--gbr:rgba(255,255,255,.06);
--t1:#eee;--t2:#999;--bg1:#0d0d1a;--bg2:#1a1a2e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg1);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:calc(82px + var(--sb));transition:background .3s,color .3s}

.hdr{position:sticky;top:0;z-index:100;padding:calc(var(--st) + 8px) 20px 12px;background:var(--gbg);backdrop-filter:blur(var(--blur)) saturate(200%);-webkit-backdrop-filter:blur(var(--blur)) saturate(200%);border-bottom:1px solid var(--gbr)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:28px;font-weight:900;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.hdr-act{display:flex;gap:10px}
.ibtn{width:38px;height:38px;border-radius:50%;background:var(--gbg);border:1px solid var(--gbr);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.ibtn:active{transform:scale(.9)}
.sbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg1);border-radius:var(--rm);border:1px solid var(--gbr)}
.sbar input{flex:1;border:none;background:none;font-size:16px;color:var(--t1);outline:none;font-family:inherit}
.sbar input::placeholder{color:var(--t2)}

.tbar{position:fixed;bottom:0;left:0;right:0;z-index:1000;padding:8px 20px calc(var(--sb) + 8px);background:var(--gbg);backdrop-filter:blur(var(--blur)) saturate(200%);-webkit-backdrop-filter:blur(var(--blur)) saturate(200%);border-top:1px solid var(--gbr);display:flex;justify-content:space-around}
.titem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border-radius:var(--rs);transition:all .2s}
.titem.active .ticn,.titem.active .tlbl{color:var(--ac)}
.ticn{font-size:22px;color:var(--t2);transition:color .2s}
.tlbl{font-size:10px;font-weight:600;color:var(--t2);transition:color .2s}

.hero{padding:16px 0}
.hslider{position:relative;width:100%;overflow:hidden}
.htrack{display:flex;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.hslide{min-width:100%;padding:0 20px}
.hcard{position:relative;width:100%;height:420px;border-radius:var(--rxl);overflow:hidden;box-shadow:0 20px 60px rgba(108,92,231,.12);background:var(--bg2)}
.hcard img{width:100%;height:100%;object-fit:cover;display:block}
.hovr{position:absolute;bottom:0;left:0;right:0;padding:80px 24px 24px;background:linear-gradient(transparent,rgba(0,0,0,.85));color:#fff}
.hbdg{display:inline-block;padding:4px 12px;background:var(--ac);border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.htitle{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hdesc{font-size:13px;opacity:.85;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hdots{display:flex;justify-content:center;gap:6px;padding:14px 0 0}
.hdot{width:8px;height:8px;border-radius:50%;background:var(--t2);opacity:.3;transition:all .3s;cursor:pointer}
.hdot.active{width:24px;border-radius:4px;background:var(--ac);opacity:1}

.sec{padding:8px 20px 16px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.sec-more{font-size:14px;font-weight:600;color:var(--ac);cursor:pointer}

.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ccard{border-radius:var(--rm);overflow:hidden;cursor:pointer;transition:transform .2s;background:var(--bg2);box-shadow:0 4px 12px rgba(0,0,0,.05)}
.ccard:active{transform:scale(.96)}
.ccover{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:var(--bg2)}
.ccover img{width:100%;height:100%;object-fit:cover;display:block}
.cbadge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:#fff;background:var(--ac)}
.crating{position:absolute;bottom:8px;right:8px;padding:3px 7px;border-radius:6px;background:rgba(0,0,0,.7);color:#FFD60A;font-size:10px;font-weight:700;display:flex;align-items:center;gap:3px}
.cinfo{padding:10px}
.ctitle{font-size:12px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.cchap{font-size:11px;color:var(--t2);font-weight:500}

.hscr{display:flex;gap:14px;overflow-x:auto;padding:0 20px;scrollbar-width:none;scroll-snap-type:x mandatory}
.hscr::-webkit-scrollbar{display:none}
.hscr .ccard{min-width:140px;max-width:140px;scroll-snap-align:start}

.pgview{display:none;animation:fadeIn .3s ease}
.pgview.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.det-hdr{position:relative;height:350px;overflow:hidden;background:var(--bg2)}
.det-hdr img{width:100%;height:100%;object-fit:cover}
.det-hdr-ovr{position:absolute;bottom:0;left:0;right:0;padding:80px 20px 20px;background:linear-gradient(transparent,var(--bg1))}
.det-back{position:absolute;top:calc(var(--st) + 12px);left:16px;width:40px;height:40px;border-radius:50%;background:var(--gbg);backdrop-filter:blur(20px);border:1px solid var(--gbr);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;z-index:10}
.det-cnt{padding:0 20px;margin-top:-40px;position:relative;z-index:5}
.det-crow{display:flex;gap:16px;align-items:flex-end}
.det-cov{width:130px;height:195px;border-radius:var(--rm);overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2);flex-shrink:0;background:var(--bg2)}
.det-cov img{width:100%;height:100%;object-fit:cover}
.det-meta{flex:1}
.det-title{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:8px}
.det-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.det-tag{padding:4px 10px;border-radius:20px;background:var(--bg2);border:1px solid var(--gbr);font-size:11px;font-weight:600;color:var(--t2)}
.det-stats{display:flex;gap:16px}
.det-stat{text-align:center}
.det-sv{font-size:16px;font-weight:800;color:var(--ac)}
.det-sl{font-size:10px;color:var(--t2);font-weight:600}
.det-acts{display:flex;gap:10px;margin-top:16px}
.btn-p{flex:1;padding:14px;border-radius:var(--rm);background:var(--gr);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-p:active{transform:scale(.96)}
.btn-s{width:50px;height:50px;border-radius:var(--rm);background:var(--bg2);border:1px solid var(--gbr);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.btn-s:active{transform:scale(.9)}
.det-syn{margin-top:20px;padding:16px;background:var(--bg2);border-radius:var(--rm);border:1px solid var(--gbr)}
.det-syn h3{font-size:15px;font-weight:700;margin-bottom:8px}
.det-syn p{font-size:13px;line-height:1.6;color:var(--t2)}
.chlist{margin-top:16px;padding-bottom:20px}
.chlist h3{font-size:17px;font-weight:700;margin-bottom:12px}
.chitem{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border-radius:var(--rs);margin-bottom:8px;border:1px solid var(--gbr);cursor:pointer;transition:all .2s}
.chitem:active{transform:scale(.98);background:var(--ac);color:#fff}
.chitem:active .chdate{color:rgba(255,255,255,.7)}
.chleft{display:flex;align-items:center;gap:12px}
.chnum{width:36px;height:36px;border-radius:10px;background:var(--gr);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.chtitle{font-size:14px;font-weight:600}
.chdate{font-size:11px;color:var(--t2);font-weight:500}

.rdpage{padding-top:calc(var(--st) + 60px)}
.rdhdr{position:fixed;top:0;left:0;right:0;z-index:200;padding:calc(var(--st) + 8px) 16px 12px;background:var(--gbg);backdrop-filter:blur(var(--blur));border-bottom:1px solid var(--gbr);display:flex;align-items:center;gap:12px}
.rdtitle{flex:1;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rdimgs{display:flex;flex-direction:column;align-items:center;gap:2px}
.rdimgs img{width:100%;max-width:800px;display:block;background:var(--bg2);min-height:100px}
.rdnav{display:flex;gap:12px;padding:20px;justify-content:center;flex-wrap:wrap}
.rdnav .btn-p{flex:none;padding:14px 28px}

.sitem{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg2);border-radius:var(--rm);margin-bottom:8px;border:1px solid var(--gbr)}
.sleft{display:flex;align-items:center;gap:12px}
.sicon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.slbl{font-size:15px;font-weight:600}
.tgl{width:50px;height:30px;border-radius:15px;background:#e9e9eb;position:relative;cursor:pointer;transition:background .3s}
.tgl.active{background:var(--grn)}
.tgl::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.tgl.active::after{transform:translateX(20px)}

.ldbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--gbr);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldtxt{font-size:14px;color:var(--t2);font-weight:500}

.toast{position:fixed;top:calc(var(--st) + 60px);left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;background:rgba(30,30,30,.9);backdrop-filter:blur(20px);border-radius:50px;color:#fff;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.68,-.55,.265,1.55);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

.ggrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 20px}
.gcard{padding:16px;border-radius:var(--rm);text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);border:1px solid var(--gbr)}
.gcard:active{transform:scale(.95)}
.gicon{font-size:28px;margin-bottom:6px}
.gname{font-size:13px;font-weight:600}

.bkempty{text-align:center;padding:60px 20px}
.bkempty-icon{font-size:60px;margin-bottom:16px}
.bkempty h3{font-size:18px;font-weight:700;margin-bottom:8px}
.bkempty p{color:var(--t2);font-size:14px}

.banner{padding:10px 20px;text-align:center;font-size:13px;font-weight:600;transition:all .3s}
.banner.ld{background:#6C5CE722;color:var(--ac)}
.banner.ok{background:#00B89422;color:var(--grn)}
.banner.err{background:#FF3B3022;color:var(--red)}

.dbg-panel{position:fixed;bottom:90px;left:10px;right:10px;max-height:50vh;overflow-y:auto;background:rgba(0,0,0,.92);color:#0f0;font-size:11px;font-family:'Courier New',monospace;padding:12px;border-radius:12px;display:none;white-space:pre-wrap;word-break:break-all;z-index:9000;border:1px solid rgba(255,255,255,.1)}
.dbg-panel.show{display:block}
.dbg-panel .dbg-line{margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:4px}
.dbg-ok{color:#0f0}
.dbg-err{color:#f55}
.dbg-warn{color:#fd0}
.dbg-info{color:#5af}

.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg1) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--rm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.ubdg{display:inline-block;padding:2px 8px;background:var(--grn);color:#fff;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

@media(min-width:768px){.cgrid{grid-template-columns:repeat(4,1fr)}.hcard{height:480px}}
@media(min-width:1024px){.cgrid{grid-template-columns:repeat(6,1fr)}}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="banner ld" id="banner">⏳ Menghubungkan...</div>
<div class="dbg-panel" id="dbgPanel"></div>

<header class="hdr">
<div class="hdr-top">
<div class="logo">KomikKu</div>
<div class="hdr-act">
<div class="ibtn" onclick="toggleTheme()" id="themeBtn">🌙</div>
<div class="ibtn" onclick="toggleDbg()" title="Debug Log">🐛</div>
</div>
</div>
<div class="sbar"><span>🔍</span><input type="text" id="searchIn" placeholder="Cari komik (contoh: Solo Leveling)..." oninput="doSearch(this.value)"></div>
</header>

<main id="mainCnt">
<div class="pgview active" id="pgHome">
<div class="hero"><div class="hslider"><div class="htrack" id="htrack"></div></div><div class="hdots" id="hdots"></div></div>
<div class="sec"><div class="sec-hdr"><h2 class="sec-title">🔥 Populer</h2><a class="sec-more" onclick="loadMore('popular')">Lihat Semua</a></div><div class="hscr" id="popScroll"></div></div>
<div class="sec"><div class="sec-hdr"><h2 class="sec-title">⚡ Terbaru <span class="ubdg">LIVE</span></h2><a class="sec-more" onclick="loadMore('latest')">Lihat Semua</a></div><div class="cgrid" id="latestGrid"></div></div>
<div class="sec"><div class="sec-hdr"><h2 class="sec-title">📗 Manhwa</h2></div><div class="hscr" id="manhwaScroll"></div></div>
<div class="sec"><div class="sec-hdr"><h2 class="sec-title">📘 Manhua</h2></div><div class="hscr" id="manhuaScroll"></div></div>
<div class="sec"><div class="sec-hdr"><h2 class="sec-title">🎭 Genre</h2></div></div>
<div class="ggrid" id="genreGrid"></div>
<div style="height:20px"></div>
</div>
<div class="pgview" id="pgBrowse"><div class="sec"><div class="sec-hdr"><h2 class="sec-title" id="browseTitle">Jelajahi</h2></div><div class="cgrid" id="browseGrid"></div></div></div>
<div class="pgview" id="pgBookmark"><div class="sec"><div class="sec-hdr"><h2 class="sec-title">📚 Bookmark</h2></div><div id="bkContent"></div></div></div>
<div class="pgview" id="pgDetail"><div id="detCnt"></div></div>
<div class="pgview" id="pgReader"><div id="rdCnt"></div></div>
</main>

<nav class="tbar">
<div class="titem active" onclick="switchTab('home')"><span class="ticn">🏠</span><span class="tlbl">Beranda</span></div>
<div class="titem" onclick="switchTab('browse')"><span class="ticn">🔍</span><span class="tlbl">Jelajahi</span></div>
<div class="titem" onclick="switchTab('bookmark')"><span class="ticn">📚</span><span class="tlbl">Bookmark</span></div>
<div class="titem" onclick="switchTab('settings')"><span class="ticn">👤</span><span class="tlbl">Pengaturan</span></div>
</nav>

<script>
// =====================================================
//  KONFIGURASI
// =====================================================
var MD = 'https://api.mangadex.org';
var COVER_CDN = 'https://uploads.mangadex.org/covers';

var S = {
  slide: 0, slideTmr: null,
  popular: [], latest: [], manhwaList: [], manhuaList: [],
  allComics: [],
  bookmarks: JSON.parse(localStorage.getItem('bk5') || '[]'),
  theme: localStorage.getItem('th5') || 'light',
  apiOk: false, lastUpd: null,
  curDetail: null, curChapters: [],
  proxyMode: 'auto', // 'local', 'cors', 'auto'
};

var _cache = {};
var CACHE_TTL = 600000;
var _dbgLines = [];

// =====================================================
//  DEBUG LOGGER
// =====================================================
function dbg(msg, type) {
  type = type || 'info';
  var time = new Date().toLocaleTimeString('id-ID');
  var line = {time: time, msg: msg, type: type};
  _dbgLines.push(line);
  if (_dbgLines.length > 200) _dbgLines.shift();
  renderDbg();
  if (type === 'err') console.error(msg);
  else if (type === 'warn') console.warn(msg);
  else console.log(msg);
}

function renderDbg() {
  var box = document.getElementById('dbgPanel');
  if (!box) return;
  box.innerHTML = _dbgLines.map(function(l) {
    return '<div class="dbg-line dbg-' + l.type + '">[' + l.time + '] ' + l.msg + '</div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function toggleDbg() {
  document.getElementById('dbgPanel').classList.toggle('show');
}

// =====================================================
//  DETECT PLATFORM
// =====================================================
function detectPlatform() {
  var host = location.hostname;
  if (host.indexOf('vercel') >= 0 || host.indexOf('localhost') >= 0) {
    S.proxyMode = 'local';
    dbg('📍 Platform: Vercel/Local (proxy sendiri)', 'ok');
  } else {
    S.proxyMode = 'cors';
    dbg('📍 Platform: ' + host + ' (CORS proxy)', 'warn');
  }
}

// =====================================================
//  FETCH DENGAN MULTI-MODE PROXY
// =====================================================
var CORS_PROXIES = [
  {name: 'corsproxy.io', fn: function(u){return 'https://corsproxy.io/?url=' + encodeURIComponent(u);}},
  {name: 'cors.lol', fn: function(u){return 'https://api.cors.lol/?url=' + encodeURIComponent(u);}},
  {name: 'allorigins', fn: function(u){return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u);}},
  {name: 'codetabs', fn: function(u){return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u);}},
];

var _workingProxy = null;

async function apiFetch(path) {
  var cacheKey = path;
  if (_cache[cacheKey] && Date.now() - _cache[cacheKey].t < CACHE_TTL) {
    dbg('💾 Cache: ' + path, 'ok');
    return _cache[cacheKey].d;
  }

  var targetUrl = MD + path;

  // MODE 1: Local proxy (Vercel/Localhost)
  if (S.proxyMode === 'local') {
    try {
      var localUrl = '/api/proxy?url=' + encodeURIComponent(targetUrl);
      dbg('📡 Local proxy: ' + path);
      var r = await fetch(localUrl);
      if (r.ok) {
        var data = await r.json();
        _cache[cacheKey] = {d: data, t: Date.now()};
        S.apiOk = true;
        dbg('✅ OK (local): ' + path + ' → ' + JSON.stringify(data).length + ' bytes', 'ok');
        return data;
      }
      dbg('⚠️ Local proxy HTTP ' + r.status, 'warn');
    } catch(e) {
      dbg('❌ Local proxy error: ' + e.message, 'err');
    }
  }

  // MODE 2: CORS proxy (GitHub Pages / other)
  // Gunakan proxy yang sudah diketahui berfungsi
  if (_workingProxy !== null) {
    try {
      var proxy = CORS_PROXIES[_workingProxy];
      var proxyUrl = proxy.fn(targetUrl);
      dbg('📡 Proxy [' + proxy.name + ']: ' + path);
      var r = await fetch(proxyUrl);
      if (r.ok) {
        var text = await r.text();
        var data = JSON.parse(text);
        _cache[cacheKey] = {d: data, t: Date.now()};
        S.apiOk = true;
        dbg('✅ OK [' + proxy.name + ']: ' + path + ' → ' + text.length + ' bytes', 'ok');
        return data;
      }
      dbg('⚠️ [' + proxy.name + '] HTTP ' + r.status, 'warn');
    } catch(e) {
      dbg('❌ [' + CORS_PROXIES[_workingProxy].name + '] error: ' + e.message, 'err');
      _workingProxy = null; // Reset, coba semua lagi
    }
  }

  // Coba semua proxy satu per satu
  dbg('🔄 Mencoba semua CORS proxy...', 'info');
  for (var i = 0; i < CORS_PROXIES.length; i++) {
    var proxy = CORS_PROXIES[i];
    try {
      var proxyUrl = proxy.fn(targetUrl);
      dbg('📡 Coba [' + i + '] ' + proxy.name + ': ' + path.substring(0, 60) + '...');

      var controller = new AbortController();
      var timeout = setTimeout(function(){ controller.abort(); }, 12000);
      var r = await fetch(proxyUrl, {signal: controller.signal});
      clearTimeout(timeout);

      if (!r.ok) {
        dbg('⚠️ [' + proxy.name + '] HTTP ' + r.status, 'warn');
        continue;
      }

      var text = await r.text();
      dbg('📥 [' + proxy.name + '] Response: ' + text.length + ' bytes, starts: ' + text.substring(0, 80), 'info');

      // Cek apakah response valid JSON
      var data;
      try {
        data = JSON.parse(text);
      } catch(pe) {
        dbg('❌ [' + proxy.name + '] Bukan JSON valid: ' + pe.message, 'err');
        dbg('📄 Raw (200 char): ' + text.substring(0, 200), 'warn');
        continue;
      }

      // Sukses!
      _workingProxy = i;
      _cache[cacheKey] = {d: data, t: Date.now()};
      S.apiOk = true;
      dbg('✅ BERHASI [' + proxy.name + ']: ' + path + ' → ' + text.length + ' bytes', 'ok');
      return data;

    } catch(e) {
      dbg('❌ [' + proxy.name + '] Error: ' + e.message, 'err');
      continue;
    }
  }

  // Semua gagal
  dbg('❌❌ SEMUA PROXY GAGAL untuk: ' + path, 'err');

  // Return stale cache jika ada
  if (_cache[cacheKey]) {
    dbg('💾 Pakai cache lama', 'warn');
    return _cache[cacheKey].d;
  }
  return null;
}

//  PLACEHOLDER SVG
// =====================================================
var COLORS = [['#6C5CE7','#A29BFE'],['#00B894','#55EFC4'],['#0984E3','#74B9FF'],['#E17055','#FAB1A0'],['#FDCB6E','#F8E71C'],['#D63031','#FF7675']];
var EMOJIS = ['📖','⚔️','🐉','🌟','💫','🔥','👊','🗡️','🏴‍☠️','🦸','👹','🎭','💀','🌸','⚡'];
function escXml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function makePH(title, idx) {
  var pal = COLORS[(idx||0) % COLORS.length];
  var emoji = EMOJIS[(idx||0) % EMOJIS.length];
  var t = (title||'Komik').substring(0,18);
  return 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450">' +
    '<defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">' +
    '<stop offset="0%" stop-color="'+pal[0]+'"/><stop offset="100%" stop-color="'+pal[1]+'"/>' +
    '</linearGradient></defs>' +
    '<rect fill="url(#g)" width="300" height="450" rx="8"/>' +
    '<text x="150" y="190" text-anchor="middle" fill="white" font-size="72" font-family="Arial">'+emoji+'</text>' +
    '<text x="150" y="260" text-anchor="middle" fill="white" font-size="17" font-family="Arial" font-weight="bold">'+escXml(t)+'</text>' +
    '<text x="150" y="290" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12" font-family="Arial">MANGADEX</text></svg>'
  );
}

// =====================================================
//  IMAGE TAG DENGAN FALLBACK
// =====================================================
function imgTag(url, title, idx, extra) {
  var ph = makePH(title, idx);
  var src = url || ph;
  return '<img src="'+src+'" alt="'+escXml(title||'')+'" ' +
    'data-orig="'+escXml(url||'')+'" data-ph="'+escXml(ph)+'" data-try="0" ' +
    'loading="lazy" onerror="imgErr(this)" '+(extra||'')+'>';
}

function imgErr(img) {
  var tryLvl = parseInt(img.getAttribute('data-try')||'0');
  var orig = img.getAttribute('data-orig')||'';
  var ph = img.getAttribute('data-ph')||'';
  img.onerror = null;
  if (tryLvl === 0 && orig) {
    img.setAttribute('data-try','1');
    img.onerror = function(){imgErr(this);};
    img.src = 'https://wsrv.nl/?url=' + encodeURIComponent(orig) + '&w=400&q=80';
  } else {
    img.src = ph;
  }
}

// =====================================================
//  MANGADEX API PARSER
// =====================================================
function getMangaTitle(manga) {
  var a = manga.attributes;
  if (!a || !a.title) return 'Unknown';
  var t = a.title;
  return t.en || t['ja-ro'] || t.ja || t.ko || t.id || Object.values(t)[0] || 'Unknown';
}

function getMangaDesc(manga) {
  var a = manga.attributes;
  if (!a || !a.description) return '';
  var d = a.description;
  return d.id || d.en || d['ja-ro'] || Object.values(d).find(function(v){return v;}) || '';
}

function getCoverUrl(mangaId, relationships) {
  if (!relationships) return '';
  for (var i = 0; i < relationships.length; i++) {
    if (relationships[i].type === 'cover_art' && relationships[i].attributes) {
      var fn = relationships[i].attributes.fileName;
      if (fn) return COVER_CDN + '/' + mangaId + '/' + fn + '.256.jpg';
    }
  }
  return '';
}

function detectMangaType(manga) {
  var a = manga.attributes;
  if (!a) return 'manga';
  var pub = (a.publicationDemographic || '').toLowerCase();
  if (pub === 'josei' || pub === 'seinen' || pub === 'shoujo' || pub === 'shounen') return 'manga';
  var tags = a.tags || [];
  for (var i = 0; i < tags.length; i++) {
    var name = (tags[i].attributes && tags[i].attributes.name && tags[i].attributes.name.en || '').toLowerCase();
    if (name === 'long strip') return 'manhwa';
  }
  var origLang = a.originalLanguage || '';
  if (origLang === 'ko') return 'manhwa';
  if (origLang === 'zh') return 'manhua';
  return 'manga';
}

function parseMangaList(apiData) {
  if (!apiData || !apiData.data || !Array.isArray(apiData.data)) {
    dbg('⚠️ parseMangaList: invalid data format', 'warn');
    dbg('📄 Keys: ' + (apiData ? Object.keys(apiData).join(',') : 'null'), 'info');
    return [];
  }
  dbg('📋 Parsing ' + apiData.data.length + ' manga items', 'info');
  return apiData.data.map(function(m) {
    var title = getMangaTitle(m);
    var cover = getCoverUrl(m.id, m.relationships);
    var type = detectMangaType(m);
    var tags = (m.attributes && m.attributes.tags || []).map(function(t) {
      return t.attributes && t.attributes.name && t.attributes.name.en || '';
    }).filter(Boolean);

    return {
      id: m.id,
      title: title,
      cover: cover,
      type: type,
      desc: getMangaDesc(m),
      tags: tags.slice(0, 5),
      status: m.attributes ? (m.attributes.status || '') : '',
      year: m.attributes ? (m.attributes.year || '') : '',
      rating: (Math.random() * 1.5 + 3.5).toFixed(1),
    };
  });
}

function startSlider(){
  if(S.slideTmr) clearInterval(S.slideTmr);
  S.slideTmr = setInterval(function(){
    var max = Math.min(S.popular.length,5);
    if(max<=1) return;
    S.slide=(S.slide+1)%max;
    updateSlider();
  },4000);
}
function goSlide(i){S.slide=i;updateSlider();clearInterval(S.slideTmr);startSlider();}
function updateSlider(){
  var t=document.getElementById('htrack');
  if(t) t.style.transform='translateX(-'+(S.slide*100)+'%)';
  document.querySelectorAll('.hdot').forEach(function(d,i){d.classList.toggle('active',i===S.slide);});
}
var _tx=0;
document.addEventListener('touchstart',function(e){_tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){
  var diff=_tx-e.changedTouches[0].clientX;
  if(Math.abs(diff)<50)return;
  var max=Math.min(S.popular.length,5);
  if(diff>0&&S.slide<max-1) S.slide++;
  else if(diff<0&&S.slide>0) S.slide--;
  updateSlider();
},{passive:true});

async function init() {
  applyTheme();
  detectPlatform();
  showBanner('ld','⏳ Menghubungkan ke MangaDex API...');
  showLoading();

  dbg('🚀 KomikKu v9.0 FINAL');
  dbg('📡 MangaDex API: ' + MD);
  dbg('🔧 Proxy mode: ' + S.proxyMode);

  try {
    // 1. Popular manga
    showBanner('ld','⏳ [1/4] Memuat komik populer...');
    var popRes = await apiFetch('/manga?limit=15&order[followedCount]=desc&includes[]=cover_art&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    S.popular = parseMangaList(popRes);
    dbg('📊 Popular: ' + S.popular.length + ' komik');

    // Jeda untuk rate limit
    await sleep(500);

    // 2. Latest
    showBanner('ld','⏳ [2/4] Memuat komik terbaru...');
    var latRes = await apiFetch('/manga?limit=18&order[updatedAt]=desc&includes[]=cover_art&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    S.latest = parseMangaList(latRes);
    dbg('📊 Latest: ' + S.latest.length + ' komik');

    await sleep(500);

    // 3. Manhwa (Korean)
    showBanner('ld','⏳ [3/4] Memuat manhwa...');
    var mhRes = await apiFetch('/manga?limit=15&order[followedCount]=desc&includes[]=cover_art&originalLanguage[]=ko&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    S.manhwaList = parseMangaList(mhRes);
    dbg('📊 Manhwa: ' + S.manhwaList.length + ' komik');

    await sleep(500);

    // 4. Manhua (Chinese)
    showBanner('ld','⏳ [4/4] Memuat manhua...');
    var muRes = await apiFetch('/manga?limit=15&order[followedCount]=desc&includes[]=cover_art&originalLanguage[]=zh&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    S.manhuaList = parseMangaList(muRes);
    dbg('📊 Manhua: ' + S.manhuaList.length + ' komik');

    // Gabung semua
    var all = [].concat(S.popular, S.latest, S.manhwaList, S.manhuaList);
    var seen = {};
    S.allComics = [];
    for (var i = 0; i < all.length; i++) {
      if (!seen[all[i].id]) {
        seen[all[i].id] = true;
        S.allComics.push(all[i]);
      }
    }

    S.lastUpd = new Date();

    if (S.allComics.length > 0) {
      showBanner('ok','✅ ' + S.allComics.length + ' komik berhasil dimuat dari MangaDex!');
      setTimeout(hideBanner, 5000);
      dbg('🎉 Total: ' + S.allComics.length + ' komik unik', 'ok');
    } else {
      showBanner('err','⚠️ Data kosong. Klik 🐛 untuk lihat debug log.');
      dbg('❌ Tidak ada data yang dimuat!', 'err');
    }

  } catch(e) {
    dbg('❌ Init error: ' + e.message + ' | ' + e.stack, 'err');
    showBanner('err','⚠️ Error: '+e.message+'. Klik 🐛 untuk debug.');
  }

  renderAll();
  startSlider();
}

  S.curChapters = chapters;

  var bk = S.bookmarks.some(function(b){return b.id===id;});

    '<div class="det-hdr">' +

      '<div class="det-crow">' +
        '<div class="det-cov">'+imgTag(cover, title, 1)+'</div>' +
        '<div class="det-meta">' +
          '<h1 class="det-title">'+escXml(title)+'</h1>' +
          '<div class="det-tags">' +
            '<span class="det-tag">'+escXml(type.toUpperCase())+'</span>' +
            '<span class="det-tag">'+escXml(status)+'</span>' +
            tags.slice(0,3).map(function(t){return '<span class="det-tag">'+escXml(t)+'</span>';}).join('') +
          '</div>' +
          '<div class="det-stats">' +
            (year?'<div class="det-stat"><div class="det-sv">'+year+'</div><div class="det-sl">Tahun</div></div>':'') +
            '<div class="det-stat"><div class="det-sv">'+chapters.length+'</div><div class="det-sl">Chapter</div></div>' +
            (authorName?'<div class="det-stat"><div class="det-sv" style="font-size:11px">'+escXml(authorName)+'</div><div class="det-sl">Author</div></div>':'') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="det-acts">' +
        (chapters.length
          ? '<button class="btn-p" onclick="readChapter(\''+chapters[chapters.length-1].id+'\',\''+escXml(title).replace(/'/g,"\\'")+'\')">📖 Baca Sekarang</button>'
          : '<button class="btn-p" style="opacity:.5" disabled>📖 Belum Ada Chapter</button>') +
        '<div class="btn-s" onclick="toggleBk(\''+id+'\',\''+encodeURIComponent(title)+'\',\''+encodeURIComponent(cover)+'$">'+(bk?'❤️':'🤍')+'</div>' +
      '</div>' +
      '<div class="det-syn"><h3>Sinopsis</h3><p>'+escXml(desc||'Belum ada sinopsis.')+'</p></div>' +
      '<div class="chlist"><h3>📖 Daftar Chapter ('+chapters.length+')</h3>' +
        (chapters.length
          ? chapters.map(function(ch,i){
              var langIcon = ch.lang==='id' ? ' 🇮🇩' : ' 🇬🇧';
              return '<div class="chitem" onclick="readChapter(\''+ch.id+'\',\''+escXml(title).replace(/'/g,"\\'")+'\')">' +
                '<div class="chleft">' +
                  '<div class="chnum">'+escXml(ch.num)+'</div>' +
                  '<div><div class="chtitle">'+escXml(ch.title)+'</div>' +
                  '<div class="chdate">'+escXml(ch.date)+langIcon+'</div></div>' +
                '</div><span>→</span></div>';
            }).join('')
          : '<div style="text-align:center;padding:20px;color:var(--t2)">Belum ada chapter tersedia</div>') +
      '</div>' +
    '</div>';

  window.scrollTo({top:0});
}

// =====================================================
//  READER
// =====================================================
async function readChapter(chId, title) {
  document.querySelectorAll('.pgview').forEach(function(p){p.classList.remove('active');});
  document.getElementById('pgReader').classList.add('active');
  var rc=document.getElementById('rdCnt');

  rc.innerHTML =
    '<div class="rdhdr"><div class="det-back" onclick="goBackToDetail()">←</div><div class="rdtitle">📖 '+escXml(title)+'</div></div>' +
    '<div class="ldbox" style="margin-top:80px"><div class="spinner"></div><span class="ldtxt">Memuat halaman komik...</span></div>';
  window.scrollTo({top:0});
  dbg('📄 Chapter: ' + chId);

  await sleep(300);
  var atHome = await apiFetch('/at-home/server/'+chId);

  var pages = [];
  if (atHome && atHome.baseUrl && atHome.chapter) {
    var base = atHome.baseUrl;
    var hash = atHome.chapter.hash;
    var data = atHome.chapter.data || [];
    pages = data.map(function(p){ return base + '/data/' + hash + '/' + p; });
  }

  dbg('📄 Pages: ' + pages.length);

  if (!pages.length) {
    rc.innerHTML =
      '<div class="rdhdr"><div class="det-back" onclick="goBackToDetail()">←</div><div class="rdtitle">📖 '+escXml(title)+'</div></div>' +
      '<div class="ldbox" style="margin-top:80px"><div style="font-size:48px">📖</div>' +
      '<p style="color:var(--t2);text-align:center">Halaman belum tersedia.<br>Coba chapter lain.</p>' +
      '<button class="btn-p" onclick="goBackToDetail()" style="flex:none;padding:14px 28px;margin-top:16px">← Kembali</button></div>';
    return;
  }

  var curIdx=-1;
  for(var i=0;i<S.curChapters.length;i++){if(S.curChapters[i].id===chId){curIdx=i;break;}}
  var prevCh = curIdx < S.curChapters.length-1 ? S.curChapters[curIdx+1] : null;
  var nextCh = curIdx > 0 ? S.curChapters[curIdx-1] : null;

  var nav='<div class="rdnav">';
  if(prevCh) nav+='<button class="btn-p" onclick="readChapter(\''+prevCh.id+'\',\''+escXml(title).replace(/'/g,"\\'")+'\')">⬅️ Sebelumnya</button>';
  nav+='<button class="btn-p" onclick="goBackToDetail()" style="background:var(--bg2);color:var(--t1);border:1px solid var(--gbr)">📋 Chapter</button>';
  if(nextCh) nav+='<button class="btn-p" onclick="readChapter(\''+nextCh.id+'\',\''+escXml(title).replace(/'/g,"\\'")+'\')">Selanjutnya ➡️</button>';
  nav+='</div>';

  rc.innerHTML =
    '<div class="rdpage"><div class="rdhdr"><div class="det-back" onclick="goBackToDetail()">←</div><div class="rdtitle">📖 '+escXml(title)+'</div></div>' +
    '<div class="rdimgs">'+pages.map(function(url,i){return imgTag(url,'Page '+(i+1),i,'style="background:var(--bg2);min-height:100px"');}).join('')+'</div>' +
    nav+'</div>';
  window.scrollTo({top:0});
}

function goBackToDetail(){if(S.curDetail)openDetail(S.curDetail.id);else goBack();}

// =====================================================
//  SEARCH
// =====================================================
var _searchTmr;
function doSearch(q){
  clearTimeout(_searchTmr);
  if(q.length<2){switchTab('home');return;}
  _searchTmr=setTimeout(async function(){
    document.querySelectorAll('.pgview').forEach(function(p){p.classList.remove('active');});
    document.getElementById('pgBrowse').classList.add('active');
    document.getElementById('browseTitle').textContent='🔍 Hasil: '+q;
    var grid=document.getElementById('browseGrid');
    grid.innerHTML='<div class="ldbox" style="grid-column:1/-1"><div class="spinner"></div><span class="ldtxt">Mencari...</span></div>';
    dbg('🔍 Search: '+q);
    await sleep(300);
    var res=await apiFetch('/manga?limit=20&title='+encodeURIComponent(q)+'&includes[]=cover_art&contentRating[]=safe&contentRating[]=suggestive');
    var results=parseMangaList(res);
    dbg('🔍 Results: '+results.length);
    grid.innerHTML=results.length
      ? results.map(function(c,i){return comicCard(c,i);}).join('')
      : '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t2)">Tidak ditemukan: "'+escXml(q)+'"</div>';
  },600);
}

async function browseGenre(name, tagId){
  document.querySelectorAll('.pgview').forEach(function(p){p.classList.remove('active');});
  document.getElementById('pgBrowse').classList.add('active');
  document.getElementById('browseTitle').textContent='🎭 Genre: '+name;
  var grid=document.getElementById('browseGrid');
  grid.innerHTML='<div class="ldbox" style="grid-column:1/-1"><div class="spinner"></div><span class="ldtxt">Memuat '+name+'...</span></div>';
  dbg('🎭 Genre: '+name+' ('+tagId+')');
  await sleep(300);
  var res=await apiFetch('/manga?limit=20&includes[]=cover_art&tags[]='+tagId+'&order[followedCount]=desc&contentRating[]=safe&contentRating[]=suggestive&hasAvailableChapters=true');
  var results=parseMangaList(res);
  grid.innerHTML=results.length
    ? results.map(function(c,i){return comicCard(c,i);}).join('')
    : '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t2)">Tidak ada komik genre '+name+'</div>';
}

async function loadMore(type){
  document.querySelectorAll('.pgview').forEach(function(p){p.classList.remove('active');});
  document.getElementById('pgBrowse').classList.add('active');
  var grid=document.getElementById('browseGrid');
  grid.innerHTML='<div class="ldbox" style="grid-column:1/-1"><div class="spinner"></div><span class="ldtxt">Memuat...</span></div>';
  if(type==='popular'){
    document.getElementById('browseTitle').textContent='🔥 Populer';
    var res=await apiFetch('/manga?limit=30&order[followedCount]=desc&includes[]=cover_art&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    var list=parseMangaList(res);
    grid.innerHTML=list.length?list.map(function(c,i){return comicCard(c,i);}).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t2)">Tidak ada data</div>';
  } else {
    document.getElementById('browseTitle').textContent='⚡ Terbaru';
    var res=await apiFetch('/manga?limit=30&order[updatedAt]=desc&includes[]=cover_art&hasAvailableChapters=true&contentRating[]=safe&contentRating[]=suggestive');
    var list=parseMangaList(res);
    grid.innerHTML=list.length?list.map(function(c,i){return comicCard(c,i);}).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--t2)">Tidak ada data</div>';
  }
}

function goBack(){switchTab('home');}

// =====================================================
//  BOOKMARK
// =====================================================
function toggleBk(id,encTitle,encCover){
  var idx=S.bookmarks.findIndex(function(b){return b.id===id;});
  if(idx>=0){S.bookmarks.splice(idx,1);toast('❌ Dihapus');}
  else{
    S.bookmarks.push({id:id,title:decodeURIComponent(encTitle),cover:decodeURIComponent(encCover),type:S.curDetail?S.curDetail.type:'manga'});
    toast('❤️ Bookmark ditambahkan');
  }
  localStorage.setItem('bk5',JSON.stringify(S.bookmarks));
}

// =====================================================
//  UTILITIES
// =====================================================
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';applyTheme();localStorage.setItem('th5',S.theme);}
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);var b=document.getElementById('themeBtn');if(b)b.textContent=S.theme==='dark'?'☀️':'🌙';}
async function refreshAll(){toast('⏳ Refresh...');_cache={};_workingProxy=null;await init();toast('✅ Diperbarui!');}

// =====================================================
//  START
// =====================================================
document.addEventListener('DOMContentLoaded', init);
</script>
